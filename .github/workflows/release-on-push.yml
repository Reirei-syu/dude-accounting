name: release-on-push

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-on-push-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Detect version bump
        id: version
        shell: pwsh
        run: |
          $package = Get-Content package.json | ConvertFrom-Json
          $currentVersion = [string]$package.version
          $ref = "${{ github.ref }}"
          $isTagPush = $ref.StartsWith('refs/tags/v')
          $tagVersion = if ($isTagPush) { $ref.Replace('refs/tags/v', '') } else { '' }
          $beforeSha = "${{ github.event.before }}"
          $previousVersion = ''
          $changed = $false

          if ($isTagPush) {
            if ($tagVersion -ne $currentVersion) {
              throw "Tag version $tagVersion does not match package.json version $currentVersion"
            }
            $changed = $true
          } elseif ($beforeSha -and $beforeSha -ne '0000000000000000000000000000000000000000') {
            $previousPackage = git show "${beforeSha}:package.json" 2>$null
            if ($LASTEXITCODE -eq 0 -and $previousPackage) {
              $previousVersion = [string](($previousPackage | ConvertFrom-Json).version)
            }
          }

          if ($previousVersion -and $previousVersion -ne $currentVersion) {
            $changed = $true
          }

          "current=$currentVersion" >> $env:GITHUB_OUTPUT
          "previous=$previousVersion" >> $env:GITHUB_OUTPUT
          "is_tag=$($isTagPush.ToString().ToLower())" >> $env:GITHUB_OUTPUT
          "changed=$($changed.ToString().ToLower())" >> $env:GITHUB_OUTPUT

          if (-not $changed) {
            Write-Host "No package version bump detected. Current version: $currentVersion"
          } elseif ($isTagPush) {
            Write-Host "Tag push detected for version $currentVersion"
          } else {
            Write-Host "Detected version bump: $previousVersion -> $currentVersion"
          }

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        shell: pwsh
        run: npm ci

      - name: Resolve release metadata
        id: meta
        if: steps.version.outputs.changed == 'true'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.current }}"
          $tag = "v$version"
          $name = "Release v$version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=$name" >> $env:GITHUB_OUTPUT

      - name: Verify project
        if: steps.version.outputs.changed == 'true'
        shell: pwsh
        run: |
          npm run typecheck
          npx vitest run --testTimeout=20000

      - name: Build Windows installer
        if: steps.version.outputs.changed == 'true'
        shell: pwsh
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/build-win-installer.ps1

      - name: Upload workflow artifacts
        if: steps.version.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: dude-app-windows-installer
          path: |
            D:/coding/completed/dude-app/*.exe
            D:/coding/completed/dude-app/*.blockmap
            D:/coding/completed/dude-app/latest*.yml

      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: false
          generate_release_notes: true
          files: |
            D:/coding/completed/dude-app/*.exe
            D:/coding/completed/dude-app/*.blockmap
            D:/coding/completed/dude-app/latest*.yml
